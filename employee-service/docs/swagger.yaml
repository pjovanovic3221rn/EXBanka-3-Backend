host: localhost:8080
info:
  contact: {}
  description: Employee management service for EXBanka.
  title: EXBanka Employee Service API
  version: "1.0"
paths:
  /employees:
    get:
      description: Returns all employees with optional filters
      parameters:
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Filter by position
        in: query
        name: position
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Employee'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      summary: List employees
      tags:
      - employees
    post:
      consumes:
      - application/json
      description: Creates employee and triggers credential creation in auth-service
      parameters:
      - description: Create employee request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateEmployeeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      summary: Create employee
      tags:
      - employees
  /employees/{id}:
    get:
      description: Returns employee details by ID
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Employee'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      summary: Get employee by ID
      tags:
      - employees
    put:
      consumes:
      - application/json
      description: Updates employee information
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update employee request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateEmployeeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Employee'
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Update employee
      tags:
      - employees
  /employees/{id}/active:
    patch:
      consumes:
      - application/json
      description: Activates or deactivates employee
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Active status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateEmployeeActiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Employee'
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Update employee active status
      tags:
      - employees
  /employees/{id}/permissions:
    get:
      description: Returns employee permissions
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Get employee permissions
      tags:
      - employees
  /employees/admin/me:
    get:
      description: Verifies admin-only access
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      summary: Admin test route
      tags:
      - employees
  /employees/health:
    get:
      description: Returns employee-service status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Health check
      tags:
      - employees
swagger: "2.0"
